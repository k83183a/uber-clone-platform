syntax = "proto3";

package user;
option go_package = "github.com/uber-clone/user-service/proto";

service UserService {
    rpc CreateProfile(CreateProfileRequest) returns (UserResponse);
    rpc GetProfile(GetProfileRequest) returns (UserResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (UserResponse);
    rpc DeleteProfile(DeleteProfileRequest) returns (Empty);
    rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
}

message CreateProfileRequest {
    string user_id = 1;
    string email = 2;
    string full_name = 3;
    string phone = 4;
    string avatar_url = 5;
    string date_of_birth = 6;
    string address = 7;
    string city = 8;
    string postcode = 9;
    string country = 10;
    string role = 11;
}

message GetProfileRequest {
    string user_id = 1;
    string email = 2;
}

message UpdateProfileRequest {
    string user_id = 1;
    string full_name = 2;
    string phone = 3;
    string avatar_url = 4;
    string address = 5;
    string city = 6;
    string postcode = 7;
}

message DeleteProfileRequest {
    string user_id = 1;
}

message ListProfilesRequest {
    string role = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListProfilesResponse {
    repeated UserResponse users = 1;
    int32 total = 2;
}

message UserResponse {
    string id = 1;
    string user_id = 2;
    string email = 3;
    string full_name = 4;
    string phone = 5;
    string avatar_url = 6;
    string date_of_birth = 7;
    string address = 8;
    string city = 9;
    string postcode = 10;
    string country = 11;
    string role = 12;
    bool is_active = 13;
    string created_at = 14;
}

message Empty {}