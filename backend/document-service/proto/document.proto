syntax = "proto3";

package document;
option go_package = "github.com/uber-clone/document-service/proto";

service DocumentService {
    rpc UploadDocument(UploadDocumentRequest) returns (DocumentResponse);
    rpc GetDocument(GetDocumentRequest) returns (DocumentResponse);
    rpc ListUserDocuments(ListUserDocumentsRequest) returns (ListDocumentsResponse);
    rpc VerifyDocument(VerifyDocumentRequest) returns (DocumentResponse);
    rpc GetExpiringDocuments(GetExpiringDocumentsRequest) returns (ListDocumentsResponse);
    rpc GetOCRData(GetOCRDataRequest) returns (OCRDataResponse);
    rpc DeleteDocument(DeleteDocumentRequest) returns (Empty);
}

message UploadDocumentRequest {
    string user_id = 1;
    string user_type = 2; // driver, store, rider
    string document_type = 3;
    string file_name = 4;
    string file_url = 5;
    int64 file_size = 6;
    string mime_type = 7;
}

message DocumentResponse {
    string id = 1;
    string user_id = 2;
    string user_type = 3;
    string document_type = 4;
    string file_name = 5;
    string file_url = 6;
    string status = 7;
    string rejection_reason = 8;
    int64 verified_at = 9;
    int64 expires_at = 10;
    int64 created_at = 11;
}

message GetDocumentRequest {
    string document_id = 1;
}

message ListUserDocumentsRequest {
    string user_id = 1;
    string user_type = 2;
    string document_type = 3;
}

message ListDocumentsResponse {
    repeated DocumentResponse documents = 1;
    int32 total = 2;
}

message VerifyDocumentRequest {
    string document_id = 1;
    string status = 2; // verified, rejected
    string rejection_reason = 3;
    string verified_by = 4;
}

message GetExpiringDocumentsRequest {
    string user_type = 1;
    int32 days_threshold = 2;
}

message GetOCRDataRequest {
    string document_id = 1;
}

message OCRDataResponse {
    string data = 1;
}

message DeleteDocumentRequest {
    string document_id = 1;
}

message Empty {}