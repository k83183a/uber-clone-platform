syntax = "proto3";

package vat;
option go_package = "github.com/uber-clone/vat-service/proto";

service VATService {
    rpc GenerateVATReport(GenerateVATReportRequest) returns (VATReportResponse);
    rpc ExportVATCSV(ExportVATCSVRequest) returns (CSVResponse);
    rpc SubmitToHMRC(SubmitToHMRCRequest) returns (SubmitResponse);
    rpc GetSubmissionStatus(GetSubmissionStatusRequest) returns (SubmissionStatusResponse);
    rpc ListSubmissions(ListSubmissionsRequest) returns (ListSubmissionsResponse);
    rpc AddVATTransaction(AddVATTransactionRequest) returns (Empty);
    rpc GetHMRCConfig(Empty) returns (HMRCConfigResponse);
    rpc SetHMRCConfig(SetHMRCConfigRequest) returns (Empty);
}

message GenerateVATReportRequest {
    int64 period_start = 1;
    int64 period_end = 2;
    string operator_id = 3;
}

message VATTransaction {
    string transaction_id = 1;
    string service_type = 2;
    string date = 3;
    double net = 4;
    double vat_rate = 5;
    double vat = 6;
    double gross = 7;
}

message VATSummary {
    double total_net_sales = 1;
    double total_vat_output = 2;
    double total_vat_input = 3;
    double vat_due = 4;
}

message VATReportResponse {
    VATSummary summary = 1;
    repeated VATTransaction transactions = 2;
}

message ExportVATCSVRequest {
    int64 period_start = 1;
    int64 period_end = 2;
}

message CSVResponse {
    bytes csv_data = 1;
}

message SubmitToHMRCRequest {
    int64 period_start = 1;
    int64 period_end = 2;
    string vat_return_json = 3;
}

message SubmitResponse {
    string submission_id = 1;
    string status = 2;
    string message = 3;
}

message GetSubmissionStatusRequest {
    string submission_id = 1;
}

message SubmissionStatusResponse {
    string submission_id = 1;
    string status = 2;
    int64 submitted_at = 3;
}

message ListSubmissionsRequest {
    int32 limit = 1;
    int32 offset = 2;
}

message SubmissionSummary {
    string submission_id = 1;
    int64 period_start = 2;
    int64 period_end = 3;
    string status = 4;
    int64 submitted_at = 5;
}

message ListSubmissionsResponse {
    repeated SubmissionSummary submissions = 1;
    int32 total = 2;
}

message AddVATTransactionRequest {
    string service_type = 1;
    string transaction_id = 2;
    int64 transaction_date = 3;
    double net_amount = 4;
    double vat_rate = 5;
    string business_model = 6;
    string operator_id = 7;
    string driver_id = 8;
    string customer_id = 9;
}

message HMRCConfigResponse {
    string client_id = 1;
    bool is_configured = 2;
}

message SetHMRCConfigRequest {
    string client_id = 1;
    string client_secret = 2;
}

message Empty {}