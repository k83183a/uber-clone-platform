syntax = "proto3";

package featureflag;
option go_package = "github.com/uber-clone/featureflag-service/proto";

service FeatureFlagService {
    rpc GetFlag(GetFlagRequest) returns (FlagResponse);
    rpc SetFlag(SetFlagRequest) returns (Empty);
    rpc GetConfig(GetConfigRequest) returns (ConfigResponse);
    rpc SetConfig(SetConfigRequest) returns (Empty);
    rpc ListAllFlags(Empty) returns (FlagsList);
    rpc ListAllConfigs(Empty) returns (ConfigsList);
}

message GetFlagRequest {
    string flag_name = 1;
}

message FlagResponse {
    bool enabled = 1;
}

message SetFlagRequest {
    string flag_name = 1;
    bool enabled = 2;
}

message GetConfigRequest {
    string config_key = 1;
}

message ConfigResponse {
    string value = 1;
}

message SetConfigRequest {
    string config_key = 1;
    string value = 2;
}

message FlagsList {
    map<string, bool> flags = 1;
}

message ConfigsList {
    map<string, string> configs = 1;
}

message Empty {}