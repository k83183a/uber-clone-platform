syntax = "proto3";

package loyalty;
option go_package = "github.com/uber-clone/loyalty-service/proto";

service LoyaltyService {
    rpc GetAccount(GetAccountRequest) returns (AccountResponse);
    rpc GetTransactions(GetTransactionsRequest) returns (TransactionsResponse);
    rpc EarnPoints(EarnPointsRequest) returns (Empty);
    rpc RedeemReward(RedeemRewardRequest) returns (RedeemResponse);
    rpc ListRewards(Empty) returns (RewardsResponse);
    rpc GetTiers(Empty) returns (TiersResponse);
}

message GetAccountRequest {
    string user_id = 1;
}

message AccountResponse {
    int32 points_balance = 1;
    int32 lifetime_points = 2;
    string tier = 3;
    int32 points_to_next_tier = 4;
    string next_tier_name = 5;
    double next_tier_multiplier = 6;
}

message GetTransactionsRequest {
    string user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message Transaction {
    string id = 1;
    string type = 2;
    int32 points = 3;
    string source = 4;
    int64 created_at = 5;
}

message TransactionsResponse {
    repeated Transaction transactions = 1;
    int32 total = 2;
}

message EarnPointsRequest {
    string user_id = 1;
    int32 base_points = 2;
    string source = 3;
    string source_id = 4;
}

message Empty {}

message RedeemRewardRequest {
    string user_id = 1;
    string reward_id = 2;
}

message RedeemResponse {
    string redemption_code = 1;
    string message = 2;
}

message Reward {
    string id = 1;
    string name = 2;
    string description = 3;
    int32 points_cost = 4;
    string reward_type = 5;
    double reward_value = 6;
}

message RewardsResponse {
    repeated Reward rewards = 1;
}

message Tier {
    string name = 1;
    int32 min_points = 2;
    double point_multiplier = 3;
}

message TiersResponse {
    repeated Tier tiers = 1;
}