syntax = "proto3";

package geofencing;
option go_package = "github.com/uber-clone/geofencing-service/proto";

service GeofencingService {
    rpc PointInZone(PointInZoneRequest) returns (PointInZoneResponse);
    rpc GetZonesForLocation(GetZonesForLocationRequest) returns (GetZonesForLocationResponse);
    rpc GetCity(GetCityRequest) returns (GetCityResponse);
    rpc ListZones(ListZonesRequest) returns (ListZonesResponse);
    rpc CreateZone(CreateZoneRequest) returns (Zone);
    rpc UpdateZone(UpdateZoneRequest) returns (Zone);
    rpc DeleteZone(DeleteZoneRequest) returns (Empty);
}

message PointInZoneRequest {
    double latitude = 1;
    double longitude = 2;
    string zone_name = 3;
}

message PointInZoneResponse {
    bool contains = 1;
    double pickup_surcharge = 2;
    double dropoff_surcharge = 3;
}

message GetZonesForLocationRequest {
    double latitude = 1;
    double longitude = 2;
}

message GetZonesForLocationResponse {
    repeated ZoneInfo zones = 1;
    double total_pickup_surcharge = 2;
    double total_dropoff_surcharge = 3;
}

message ZoneInfo {
    string zone_name = 1;
    string zone_type = 2;
    double pickup_surcharge = 3;
    double dropoff_surcharge = 4;
}

message GetCityRequest {
    double latitude = 1;
    double longitude = 2;
}

message GetCityResponse {
    string city = 1;
}

message ListZonesRequest {
    string zone_type = 1;
}

message ListZonesResponse {
    repeated Zone zones = 1;
}

message CreateZoneRequest {
    string name = 1;
    string type = 2;
    string description = 3;
    double pickup_surcharge = 4;
    double dropoff_surcharge = 5;
    string geo_json = 6;
}

message UpdateZoneRequest {
    string id = 1;
    string name = 2;
    string type = 3;
    string description = 4;
    double pickup_surcharge = 5;
    double dropoff_surcharge = 6;
    string geo_json = 7;
}

message DeleteZoneRequest {
    string id = 1;
}

message Zone {
    string id = 1;
    string name = 2;
    string type = 3;
    string description = 4;
    double pickup_surcharge = 5;
    double dropoff_surcharge = 6;
    string geo_json = 7;
}

message Empty {}