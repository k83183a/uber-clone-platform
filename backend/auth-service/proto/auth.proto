syntax = "proto3";

package auth;
option go_package = "github.com/uber-clone/auth-service/proto";

service AuthService {
    rpc Register(RegisterRequest) returns (AuthResponse);
    rpc Login(LoginRequest) returns (AuthResponse);
    rpc ValidateToken(ValidateRequest) returns (ValidateResponse);
}

message RegisterRequest {
    string email = 1;
    string phone = 2;
    string password = 3;
    string role = 4;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message AuthResponse {
    string token = 1;
    string user_id = 2;
    string email = 3;
    string role = 4;
    int64 expires_in = 5;
}

message ValidateRequest {
    string token = 1;
}

message ValidateResponse {
    bool valid = 1;
    string user_id = 2;
    string role = 3;
}