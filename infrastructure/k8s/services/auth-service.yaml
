apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: uber
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: ghcr.io/uber-clone/auth-service:latest
        ports:
        - containerPort: 50051
        env:
        - name: DB_DSN
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: auth_dsn
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: KAFKA_BROKER
          value: "kafka.kafka.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: uber
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
  type: ClusterIP