name: rider_app
description: Uber clone rider app
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  # State & Routing
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^12.1.0
  # Networking
  dio: ^5.3.2
  socket_io_client: ^2.0.3
  # Storage
  flutter_secure_storage: ^9.0.0
  # Payment
  stripe_payment: ^1.1.0
  # Notifications
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^15.1.0
  # Utilities
  intl: ^0.18.1
  equatable: ^2.0.5
  logger: ^1.4.0
  geocoding: ^2.1.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/